repositories:
  - path: /repo
    branch: master
    enabled: true

schedule:
  base_interval: 600
  jitter_range: 50

ollama:
  enabled: true
  url: http://192.168.5.2:11434
  model: llama3.2:3b
  timeout: 30
  max_tokens: 100
  theme: "Kubernetes around Travelduty site. Pick site related features and k8s components"
  system_prompt: "Generate a short, conventional commit message based on the provided git diff. Use types: feat, fix, chore, docs, refactor, test, style."

commit:
  use_ollama: true

push:
  enabled: true
  remote: origin
  retries: 3
